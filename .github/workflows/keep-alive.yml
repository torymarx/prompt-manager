name: Keep Supabase Awake

on:
  schedule:
    - cron: '0 */6 * * *' # 6시간마다 실행 (00:00, 06:00, 12:00, 18:00 UTC)
  workflow_dispatch: # 수동 실행 가능

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Health API
        run: |
          # 대표님, 아래 URL이 실제 Vercel 배포 주소와 일치하는지 확인해 주세요!
          # 기본적으로 프로젝트명을 기반으로 설정했습니다.
          URL="https://prompt-manager-three-coral.vercel.app/api/health"
          
          curl -X GET "$URL" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -f || echo "Ping failed, but continuing..."
